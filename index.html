<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viva La Pizza – Menú</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #efa52b;
    --card-bg: #181818;
    --card-bg2: #141414;
    --white: #f0ece4;
    --neon-red: #c22b27;
    --neon-gold: #efa52b;
    --gold: #efa52b;
    --brand-red: #c22b27;
    --brand-yellow: #efa52b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Montserrat', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* subtle grid overlay on yellow bg */
  body::before {
    content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
      linear-gradient(rgba(1,1,1,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(1,1,1,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridScroll 20s linear infinite;
  }
  @keyframes gridScroll { to { background-position: 0 60px; } }

  /* canvases */
  #pizzaCanvas  { position:fixed; inset:0; z-index:1; pointer-events:none; }
  #sparksCanvas { position:fixed; inset:0; z-index:2; pointer-events:none; }

  /* ── SCROLLING TICKER TITLE ── */
  .title-section {
    position: relative; z-index: 10;
    flex-shrink: 0;
    background: #010101;
    border-top: 3px solid var(--brand-red);
    border-bottom: 3px solid var(--brand-red);
    overflow: hidden;
    height: 76px;
    display: flex;
    align-items: center;
  }
  .ticker-track {
    display: flex;
    align-items: center;
    white-space: nowrap;
    animation: tickerScroll 55s linear infinite;
    will-change: transform;
  }
  @keyframes tickerScroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .ticker-item {
    display: inline-flex;
    align-items: center;
    gap: 24px;
    padding: 0 32px;
  }
  .ticker-logo {
    width: 58px;
    height: 58px;
    object-fit: cover;
    flex-shrink: 0;
    border-radius: 50%;
    filter: drop-shadow(0 0 6px rgba(194,43,39,0.5));
  }
  .ticker-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 4.5vw, 4.2rem);
    letter-spacing: .28em;
    color: #fff;
    line-height: 1;
    text-shadow:
      0 0 6px #fff,
      0 0 20px var(--brand-red),
      0 0 50px var(--brand-red);
    animation: neonFlicker 5s infinite;
  }
  .ticker-dot {
    width: 10px; height: 10px;
    background: var(--brand-yellow);
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 8px var(--brand-yellow);
  }
  @keyframes neonFlicker {
    0%,19%,21%,23%,25%,54%,56%,100% {
      text-shadow: 0 0 6px #fff, 0 0 20px var(--brand-red), 0 0 50px var(--brand-red);
      color: #fff;
    }
    20%,24%,55% { text-shadow:none; color:#c22b2755; }
  }

  /* ── Grid ── */
  main {
    position:relative; z-index:5;
    flex: 1;
    padding: 8px 12px 12px;
    overflow: hidden;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(5, 1fr);
    gap: 4px;
    height: 100%;
  }

  /* ── Card ── */
  .card {
    position: relative;
    background: linear-gradient(145deg, var(--card-bg), var(--card-bg2));
    border: 1px solid #ffffff0d;
    border-radius: 7px;
    padding: 10px 0 0 12px;
    overflow: hidden;
    transition: transform .28s cubic-bezier(.34,1.56,.64,1), border-color .25s, box-shadow .25s, background .25s;
    animation: fadeUp .5s ease both;
    display: flex;
    flex-direction: column;
    backdrop-filter: blur(2px);
  }
  .card:hover {
    transform: translateY(-4px) scale(1.012);
    border-color: var(--brand-red);
    box-shadow: 0 8px 28px #c22b2740, 0 2px 8px #00000060, inset 0 0 20px #c22b2710;
  }
  /* left red accent bar — slowly pulsing */
  .card::after {
    content:''; position:absolute; left:0; top:10%; bottom:10%;
    width:3px;
    background: linear-gradient(180deg, transparent, var(--brand-red), var(--brand-yellow), var(--brand-red), transparent);
    border-radius:0 2px 2px 0;
    animation: edgePulse 3s ease-in-out infinite;
  }
  @keyframes edgePulse {
    0%,100% { opacity:.4; box-shadow: none; }
    50%      { opacity:1; box-shadow: 0 0 8px #c22b2799, 0 0 16px #c22b2744; }
  }

  /* name brightens on hover */
  .card:hover .card-name { color: #ffffff; }

  /* ── Card inner layout ── */
  .card-inner {
    display: flex;
    height: 100%;
    gap: 0;
    position: relative;
    z-index: 2;
    margin: 0 -12px 0 0;
  }

  /* Left content: 70% width, sits above photo */
  .card-content {
    flex: 0 0 70%;
    max-width: 70%;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
    position: relative;
    z-index: 2;
  }

  /* Photo: absolute, right 0, full card height, 43% wide — overlaps text by 11% */
  .card-photo-wrap {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 43%;
    z-index: 1;
    border-radius: 0 7px 7px 0;
  }
  .card-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 1;
    pointer-events: none;
    filter: saturate(1.1) brightness(0.88);
    mask-image: linear-gradient(to right, transparent 0%, black 4%);
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 4%);
  }

  /* ── Row 1: number · name · price (same line) ── */
  .card-row {
    display: flex;
    align-items: baseline;
    gap: 3px;
    flex-wrap: nowrap;
    min-width: 0;
  }
  .card-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.898rem;
    letter-spacing: .06em;
    color: var(--brand-red);
    opacity: 1;
    line-height: 1;
    text-shadow: 0 0 8px #c22b2740;
    flex-shrink: 0;
  }
  .card-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.898rem;
    letter-spacing: .05em;
    color: var(--white);
    line-height: 1.1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex-shrink: 1;
    min-width: 0;
  }
  .card-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.898rem;
    letter-spacing: .04em;
    color: var(--brand-yellow);
    white-space: nowrap;
    text-shadow: 0 0 8px #efa52b55;
    flex-shrink: 0;
  }
  .dot {
    color: #ffffff25;
    font-size: .65rem;
    flex-shrink: 0;
    align-self: center;
  }

  /* ── Row 2: badges under name ── */
  .card-badges {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: .651rem;
    letter-spacing: .07em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 2px;
    font-weight: 700;
    white-space: nowrap;
  }
  .tag-veg { background:#1a3d1a; color:#5cde5c; border:1px solid #2d6b2d; animation: pulseVeg 3.5s ease-in-out infinite; }
  .tag-hot { background:#3d1515; color:#f56565; border:1px solid #6b2424; animation: pulseHot 3.5s ease-in-out infinite; animation-delay: .8s; }
  .tag-sea { background:#0f2a3d; color:#4db8ff; border:1px solid #1a4a6b; animation: pulseSea 3.5s ease-in-out infinite; animation-delay: 1.6s; }

  @keyframes pulseVeg {
    0%,100% { transform: scale(1);    box-shadow: none;                    border-color: #2d6b2d; color: #5cde5c; }
    50%      { transform: scale(1.03); box-shadow: 0 0 10px #5cde5c66; border-color: #5cde5c; color: #88ff88; }
  }
  @keyframes pulseHot {
    0%,100% { transform: scale(1);    box-shadow: none;                    border-color: #6b2424; color: #f56565; }
    50%      { transform: scale(1.03); box-shadow: 0 0 10px #f5656566; border-color: #f56565; color: #ff9090; }
  }
  @keyframes pulseSea {
    0%,100% { transform: scale(1);    box-shadow: none;                    border-color: #1a4a6b; color: #4db8ff; }
    50%      { transform: scale(1.03); box-shadow: 0 0 10px #4db8ff66; border-color: #4db8ff; color: #88d4ff; }
  }

  /* ── Row 3: ingredients ── */
  .card-ingredients {
    font-size: .935rem;
    letter-spacing: .05em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.88);
    line-height: 1.5;
    white-space: normal;
    word-break: break-word;
    max-width: 85%;
    display: -webkit-box;
    -webkit-line-clamp: 5;
    -webkit-box-orient: vertical;
    overflow: hidden;
    flex: 1;
  }

  /* ── Card gradient variants ── */
  .card-g1 { background: linear-gradient(145deg, #0a0000, #3a0a0a) !important; border-color: #5a0f0f !important; }
  .card-g2 { background: linear-gradient(145deg, #0d0d0d, #2a2a2a) !important; border-color: #3a3a3a !important; }
  .card-g3 { background: linear-gradient(145deg, #0d0d0f, #1e2028) !important; border-color: #3a3d48 !important; }
  .card-g4 { background: linear-gradient(145deg, #1a0f00, #2e1f00) !important; border-color: #5a3d00 !important; }
  .card:nth-child(1){animation-delay:.03s} .card:nth-child(2){animation-delay:.06s} .card:nth-child(3){animation-delay:.09s}
  .card:nth-child(4){animation-delay:.12s} .card:nth-child(5){animation-delay:.15s} .card:nth-child(6){animation-delay:.18s}
  .card:nth-child(7){animation-delay:.21s} .card:nth-child(8){animation-delay:.24s} .card:nth-child(9){animation-delay:.27s}
  .card:nth-child(10){animation-delay:.30s} .card:nth-child(11){animation-delay:.33s} .card:nth-child(12){animation-delay:.36s}
  .card:nth-child(13){animation-delay:.39s} .card:nth-child(14){animation-delay:.42s} .card:nth-child(15){animation-delay:.45s}
  .card:nth-child(16){animation-delay:.48s} .card:nth-child(17){animation-delay:.51s} .card:nth-child(18){animation-delay:.54s}
  .card:nth-child(19){animation-delay:.57s} .card:nth-child(20){animation-delay:.60s} .card:nth-child(21){animation-delay:.63s}
  .card:nth-child(22){animation-delay:.66s} .card:nth-child(23){animation-delay:.69s} .card:nth-child(24){animation-delay:.72s}
  .card:nth-child(25){animation-delay:.75s}
</style>
</head>
<body>

<canvas id="sparksCanvas"></canvas>

<div class="title-section">
  <div class="ticker-track" id="tickerTrack">
    <!-- content injected by JS so we can duplicate it for seamless loop -->
  </div>
</div>

<main>
  <div class="grid" id="menuGrid"></div>
</main>

const pc  = document.getElementById('pizzaCanvas');
const pct = pc.getContext('2d');
const sc  = document.getElementById('sparksCanvas');
const sct = sc.getContext('2d');
let W, H;
function resize() {
  W = pc.width = sc.width = window.innerWidth;
  H = pc.height = sc.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// pre-load logo image
const logoImg = new Image();
logoImg.src = LOGO_SRC;

class FlyingLogo {
  constructor(init) { this.spawn(init); }
  spawn(init) {
    this.size  = 22 + Math.random() * 50;
    this.x     = Math.random() * (W||1400);
    this.y     = init ? Math.random() * (H||900) : (H||900) + this.size;
    this.speed = .14 + Math.random() * .32;
    this.vx    = (Math.random() - .5) * .45;
    this.rot   = Math.random() * Math.PI * 2;
    this.vrot  = (Math.random() - .5) * .010;
    this.alpha = .06 + Math.random() * .12;
    this.life  = 0;
    this.max   = (H||900) / this.speed * 1.4;
  }
  update() {
    this.x += this.vx; this.y -= this.speed; this.rot += this.vrot; this.life++;
    if (this.y < -this.size * 2) this.spawn(false);
  }
  draw(ctx) {
    if (!logoImg.complete) return;
    const prog = this.life / this.max;
    const fade = prog < .08 ? prog/.08 : prog > .85 ? 1-(prog-.85)/.15 : 1;
    ctx.save();
    ctx.globalAlpha = this.alpha * fade;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.drawImage(logoImg, -this.size/2, -this.size/2, this.size, this.size);
    ctx.restore();
  }
}
const flyingLogos = [];
for (let i=0;i<20;i++) flyingLogos.push(new FlyingLogo(true));
function animLogo() {
  pct.clearRect(0,0,W,H);
  flyingLogos.forEach(p=>{ p.update(); p.draw(pct); });
  requestAnimationFrame(animLogo);
}
animLogo();

/* ═══════════════════════════════
   SPARKS — brand colors
═══════════════════════════════ */
const PCOLS=['#c22b27','#efa52b','#d44a20','#e83030','#f5b800'];
class Spark {
  constructor(init) { this.spawn(init); }
  spawn(init) {
    this.x=Math.random()*(W||1400); this.y=init?Math.random()*(H||900):(H||900)+6;
    this.r=.4+Math.random()*1.8; this.col=PCOLS[Math.floor(Math.random()*PCOLS.length)];
    this.a=.15+Math.random()*.5; this.vx=(Math.random()-.5)*.5; this.vy=-(.25+Math.random()*.7);
    this.life=0; this.max=180+Math.random()*280;
  }
  update() { this.x+=this.vx; this.y+=this.vy; this.life++; if(this.life>this.max||this.y<-8) this.spawn(false); }
  draw(ctx) {
    const p=this.life/this.max,f=p<.1?p/.1:p>.75?1-(p-.75)/.25:1;
    ctx.save(); ctx.globalAlpha=this.a*f; ctx.shadowBlur=7; ctx.shadowColor=this.col;
    ctx.fillStyle=this.col; ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
}
class Sparkle {
  constructor(init) { this.spawn(init); }
  spawn(init) {
    this.x=Math.random()*(W||1400); this.y=init?Math.random()*(H||900):(H||900)+10;
    this.sz=1.5+Math.random()*3; this.col=Math.random()>.6?'#ffd700':'#ff2244';
    this.a=.25+Math.random()*.45; this.vx=(Math.random()-.5)*.3; this.vy=-(.1+Math.random()*.4);
    this.rot=Math.random()*Math.PI; this.vrot=(Math.random()-.5)*.04;
    this.life=0; this.max=300+Math.random()*400;
  }
  update() { this.x+=this.vx; this.y+=this.vy; this.rot+=this.vrot; this.life++; if(this.life>this.max||this.y<-10) this.spawn(false); }
  draw(ctx) {
    const p=this.life/this.max,f=p<.1?p/.1:p>.7?1-(p-.7)/.3:1;
    ctx.save(); ctx.globalAlpha=this.a*f; ctx.strokeStyle=this.col; ctx.shadowBlur=5; ctx.shadowColor=this.col;
    ctx.lineWidth=.8; ctx.translate(this.x,this.y); ctx.rotate(this.rot);
    const s=this.sz;
    ctx.beginPath();
    ctx.moveTo(-s,0); ctx.lineTo(s,0); ctx.moveTo(0,-s); ctx.lineTo(0,s);
    ctx.moveTo(-s*.7,-s*.7); ctx.lineTo(s*.7,s*.7); ctx.moveTo(s*.7,-s*.7); ctx.lineTo(-s*.7,s*.7);
    ctx.stroke(); ctx.restore();
  }
}
const sparks=[];
for(let i=0;i<80;i++) sparks.push(new Spark(true));
for(let i=0;i<28;i++) sparks.push(new Sparkle(true));
function animSparks() {
  sct.clearRect(0,0,W,H);
  sparks.forEach(s=>{ s.update(); s.draw(sct); });
  requestAnimationFrame(animSparks);
}
animSparks();

const tagMap = {
  veg: ['tag-veg','🌿 Veg'],
  hot: ['tag-hot','🌶 Picante'],
  sea: ['tag-sea','🐟 Mar']
};

const grid = document.getElementById('menuGrid');
pizzas.forEach((p, i) => {
  const badgesHTML = p.tags.map(t => `<span class="tag ${tagMap[t][0]}">${tagMap[t][1]}</span>`).join('');
  const photoHTML  = p.photo
    ? `<div class="card-photo-wrap"><img class="card-photo" src="${p.photo}" alt="${p.name}" loading="lazy"></div>`
    : '';
  const gradientClass = i % 2 === 0 ? 'card-g1' : 'card-g4';

  const rowStyle = (p.n === 2 || p.n === 22) ? ' style="width:108%;max-width:108%"' : '';
  const ingDisplay = p.n === 2
    ? p.ing.replace(/,\s*/g, ',<br>')
    : p.n === 12
    ? 'Tomate, Mozzarella, Cebolla, Maíz, Pimiento,<br>Champiñones'
    : p.n === 19
    ? 'Tomate, Mozzarella,<br>Carne Picada,<br>Peperoni, Cebolla,<br>Pimiento, Jalapeños'
    : p.n === 20
    ? 'Tomate, Mozzarella,<br>Pollo,<br>Queso de Cabra,<br>Cebolla Caramelizada'
    : p.n === 21
    ? 'Nata, Mozzarella,<br>Jamón Cocido,<br>Cebolla,<br>Champiñones'
    : p.ing;
  const nameStyle  = p.n === 2 ? ' style="font-size:1.6rem"' : '';
  const numStyle   = p.n === 2 ? ' style="font-size:1.6rem"' : '';
  const priceStyle = p.n === 2 ? ' style="font-size:1.6rem"' : '';

  grid.innerHTML += `
    <div class="card ${gradientClass}">
      <div class="card-inner">
        <div class="card-content">
          <div class="card-row"${rowStyle}>
            <span class="card-number"${numStyle}>${String(p.n).padStart(2,'0')}</span>
            <span class="dot">·</span>
            <span class="card-name"${nameStyle}>${p.name}</span>
            <span class="dot">·</span>
            <span class="card-price"${priceStyle}>${p.price}</span>
          </div>
          ${badgesHTML ? `<div class="card-badges">${badgesHTML}</div>` : ''}
          <div class="card-ingredients">${ingDisplay}</div>
        </div>
        ${photoHTML}
      </div>
    </div>`;
});

<script>
/* ═══════════════════════════════
   ANTI-IDLE / ANTI-SLEEP
   Prevents TV browser from
   refreshing or sleeping the page
═══════════════════════════════ */

// 1. Simulate user activity every 30 seconds
setInterval(() => {
  document.dispatchEvent(new MouseEvent('mousemove', { bubbles: true }));
}, 30000);

// 2. Wake Lock API — prevents screen from sleeping (works on modern Smart TVs)
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      await navigator.wakeLock.request('screen');
    } catch (e) {}
  }
}
requestWakeLock();

// 3. Re-request wake lock if TV switches input and comes back
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});

// 4. Block accidental navigation away from the page
window.addEventListener('beforeunload', e => {
  e.preventDefault();
  e.returnValue = '';
});
</script>

<script>
/* ═══════════════════════════════
   CARD ANIMATIONS
   Numbers pulse in sync (CSS)
   Left edge bar pulses (CSS)
═══════════════════════════════ */
(function() {
  const st = document.createElement('style');
  st.textContent = `
    @keyframes numPulse {
      0%, 100% { color: var(--brand-red); text-shadow: none; }
      50%       { color: #e04040; text-shadow: 0 0 8px #c22b2755, 0 0 16px #c22b2730; }
    }
    .card-number { animation: numPulse 3s ease-in-out infinite; }
  `;
  document.head.appendChild(st);
})();
</script>
