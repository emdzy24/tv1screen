<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viva La Pizza – Menú</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #efa52b;
    --card-bg: #181818;
    --card-bg2: #141414;
    --white: #f0ece4;
    --neon-red: #c22b27;
    --neon-gold: #efa52b;
    --gold: #efa52b;
    --brand-red: #c22b27;
    --brand-yellow: #efa52b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Montserrat', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* subtle grid overlay on yellow bg */
  body::before {
    content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
      linear-gradient(rgba(1,1,1,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(1,1,1,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridScroll 20s linear infinite;
  }
  @keyframes gridScroll { to { background-position: 0 60px; } }

  /* canvases */
  #pizzaCanvas  { position:fixed; inset:0; z-index:1; pointer-events:none; }
  #sparksCanvas { position:fixed; inset:0; z-index:2; pointer-events:none; }

  /* ── SCROLLING TICKER TITLE ── */
  .title-section {
    position: relative; z-index: 10;
    flex-shrink: 0;
    background: #010101;
    border-top: 3px solid var(--brand-red);
    border-bottom: 3px solid var(--brand-red);
    overflow: hidden;
    height: 76px;
    display: flex;
    align-items: center;
  }
  .ticker-track {
    display: flex;
    align-items: center;
    white-space: nowrap;
    animation: tickerScroll 55s linear infinite;
    will-change: transform;
  }
  @keyframes tickerScroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .ticker-item {
    display: inline-flex;
    align-items: center;
    gap: 24px;
    padding: 0 32px;
  }
  .ticker-logo {
    width: 58px;
    height: 58px;
    object-fit: cover;
    flex-shrink: 0;
    border-radius: 50%;
    filter: drop-shadow(0 0 6px rgba(194,43,39,0.5));
  }
  .ticker-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 4.5vw, 4.2rem);
    letter-spacing: .28em;
    color: #fff;
    line-height: 1;
    text-shadow:
      0 0 6px #fff,
      0 0 20px var(--brand-red),
      0 0 50px var(--brand-red);
    animation: neonFlicker 5s infinite;
  }
  .ticker-dot {
    width: 10px; height: 10px;
    background: var(--brand-yellow);
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 8px var(--brand-yellow);
  }
  @keyframes neonFlicker {
    0%,19%,21%,23%,25%,54%,56%,100% {
      text-shadow: 0 0 6px #fff, 0 0 20px var(--brand-red), 0 0 50px var(--brand-red);
      color: #fff;
    }
    20%,24%,55% { text-shadow:none; color:#c22b2755; }
  }

  /* ── Grid ── */
  main {
    position:relative; z-index:5;
    flex: 1;
    padding: 8px 12px 12px;
    overflow: hidden;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(5, 1fr);
    gap: 8px;
    height: 100%;
  }

  /* ── Card ── */
  .card {
    position: relative;
    background: linear-gradient(145deg, var(--card-bg), var(--card-bg2));
    border: 1px solid #ffffff0d;
    border-radius: 7px;
    padding: 6px 0 0 8px;
    overflow: hidden;
    transition: transform .28s cubic-bezier(.34,1.56,.64,1), border-color .25s, box-shadow .25s, background .25s;
    animation: fadeUp .5s ease both;
    display: flex;
    flex-direction: column;
    backdrop-filter: blur(2px);
  }
  .card:hover {
    transform: translateY(-4px) scale(1.012);
    border-color: var(--brand-red);
    background: linear-gradient(145deg, #222, #1a1a1a);
    box-shadow:
      0 8px 28px #c22b2740,
      0 2px 8px #00000060,
      inset 0 0 20px #c22b2710;
  }
  /* left red accent bar */
  .card::after {
    content:''; position:absolute; left:0; top:10%; bottom:10%;
    width:3px;
    background: linear-gradient(180deg, transparent, var(--brand-red), var(--brand-yellow), var(--brand-red), transparent);
    opacity:0; transition:opacity .25s; border-radius:0 2px 2px 0;
  }
  .card:hover::after { opacity:1; }
  /* shimmer sweep on hover */
  .card::before {
    content:''; position:absolute;
    top:0; left:-100%; width:60%; height:100%;
    background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.06) 50%, transparent 60%);
    transition: left .55s ease;
    pointer-events: none;
    z-index: 3;
  }
  .card:hover::before { left: 150%; }

  /* number glows brighter on hover */
  .card:hover .card-number {
    text-shadow: 0 0 12px var(--brand-red), 0 0 24px #c22b2780;
  }
  /* price glows on hover */
  .card:hover .card-price {
    text-shadow: 0 0 12px var(--brand-yellow), 0 0 24px #efa52b80;
  }
  /* name brightens */
  .card:hover .card-name {
    color: #ffffff;
  }

  /* ── Card inner layout: left content + right photo ── */
  .card-inner {
    display: flex;
    height: 100%;
    gap: 0;
    position: relative;
    z-index: 2;
  }

  /* Left content: 76% width */
  .card-content {
    flex: 0 0 76%;
    max-width: 76%;
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }

  /* Right photo: 24% width */
  .card-photo-wrap {
    flex: 0 0 24%;
    position: relative;
    overflow: hidden;
    margin: -6px 0 0 0;
    border-radius: 0 7px 7px 0;
  }
  .card-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 1;
    pointer-events: none;
    filter: saturate(1.5) brightness(1.15);
    mask-image: linear-gradient(to right, transparent 0%, black 22%);
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 22%);
  }

  /* ── Row 1: number · name · price (same line) ── */
  .card-row {
    display: flex;
    align-items: baseline;
    gap: 5px;
    flex-wrap: nowrap;
    min-width: 0;
  }
  .card-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(0.85rem, 1.1vw, 1.15rem);
    letter-spacing: .06em;
    color: var(--brand-red);
    opacity: 1;
    line-height: 1;
    text-shadow: 0 0 8px #c22b2740;
    flex-shrink: 0;
  }
  .card-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(0.8rem, 1.05vw, 1.1rem);
    letter-spacing: .05em;
    color: var(--white);
    line-height: 1.1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex-shrink: 1;
    min-width: 0;
  }
  .card-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(0.8rem, 1.05vw, 1.1rem);
    letter-spacing: .04em;
    color: var(--brand-yellow);
    white-space: nowrap;
    text-shadow: 0 0 8px #efa52b55;
    flex-shrink: 0;
  }
  .dot {
    color: #ffffff25;
    font-size: .65rem;
    flex-shrink: 0;
    align-self: center;
  }

  /* ── Row 2: badges under name ── */
  .card-badges {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: .55rem;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 1px 5px;
    border-radius: 2px;
    font-weight: 700;
    white-space: nowrap;
  }
  .tag-veg { background:#1a3d1a; color:#5cde5c; border:1px solid #2d6b2d; }
  .tag-hot { background:#3d1515; color:#f56565; border:1px solid #6b2424; }
  .tag-sea { background:#0f2a3d; color:#4db8ff; border:1px solid #1a4a6b; }

  /* ── Row 3: ingredients ── */
  .card-ingredients {
    font-size: clamp(0.6rem, 0.72vw, 0.72rem);
    letter-spacing: .04em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.88);
    line-height: 1.4;
    white-space: normal;
    word-break: break-word;
    flex: 1;
  }

  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .card:nth-child(1){animation-delay:.03s} .card:nth-child(2){animation-delay:.06s} .card:nth-child(3){animation-delay:.09s}
  .card:nth-child(4){animation-delay:.12s} .card:nth-child(5){animation-delay:.15s} .card:nth-child(6){animation-delay:.18s}
  .card:nth-child(7){animation-delay:.21s} .card:nth-child(8){animation-delay:.24s} .card:nth-child(9){animation-delay:.27s}
  .card:nth-child(10){animation-delay:.30s} .card:nth-child(11){animation-delay:.33s} .card:nth-child(12){animation-delay:.36s}
  .card:nth-child(13){animation-delay:.39s} .card:nth-child(14){animation-delay:.42s} .card:nth-child(15){animation-delay:.45s}
  .card:nth-child(16){animation-delay:.48s} .card:nth-child(17){animation-delay:.51s} .card:nth-child(18){animation-delay:.54s}
  .card:nth-child(19){animation-delay:.57s} .card:nth-child(20){animation-delay:.60s} .card:nth-child(21){animation-delay:.63s}
  .card:nth-child(22){animation-delay:.66s} .card:nth-child(23){animation-delay:.69s} .card:nth-child(24){animation-delay:.72s}
  .card:nth-child(25){animation-delay:.75s}
</style>
</head>
<body>

<canvas id="pizzaCanvas"></canvas>
<canvas id="sparksCanvas"></canvas>

<div class="title-section">
  <div class="ticker-track" id="tickerTrack">
    <!-- content injected by JS so we can duplicate it for seamless loop -->
  </div>
</div>

<main>
  <div class="grid" id="menuGrid"></div>
</main>

<script>
/* ═══════════════════════════════
   TICKER – inject content & loop
═══════════════════════════════ */
const LOGO_SRC = 'data:image/png;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJYWVogAAAAAAAAb6IAADj1AAADkFhZWiAAAAAAAABimQAAt4UAABjaWFlaIAAAAAAAACSgAAAPhAAAts9YWVogAAAAAAAA9tYAAQAAAADTLXBhcmEAAAAAAAQAAAACZmYAAPKnAAANWQAAE9AAAApbAAAAAAAAAABtbHVjAAAAAAAAAAEAAAAMZW5VUwAAACAAAAAcAEcAbwBvAGcAbABlACAASQBuAGMALgAgADIAMAAxADb/2wBDAAUDBAQEAwUEBAQFBQUGBwwIBwcHBw8LCwkMEQ8SEhEPERETFhwXExQaFRERGCEYGh0dHx8fExciJCIeJBweHx7/2wBDAQUFBQcGBw4ICA4eFBEUHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh7/wAARCAEsASwDASIAAhEBAxEB/8QAHQABAAICAwEBAAAAAAAAAAAAAAcIBgkBBAUDAv/EAFMQAAEDAwEGAgUGCAcNCQAAAAEAAgMEBQYRBwgSITFBE1EiQmFxgRQyUnKRoQkVQ2KxssHRFiMzU4KSohcYNlRWc4OWwsPS0/AkNFV0dYSTs+H/xAAbAQEAAgMBAQAAAAAAAAAAAAAABAYDBQcCAf/EADgRAQABAwICBggEBgMBAAAAAAABAgMEBREhMQYSQVFhcRMyQoGRobHRFDPB8BUiQ1JT4RYjsvH/2gAMAwEAAhEDEQA/AKZIiICIiAiIgIiICIiAiIgIiICIiAiIgIiICIiAiIgIiICIiAiIgIiICIiAiIgIiICIiAiIgIiICIiAiIgIiICIiAiIgIiICIiAiIgIu7YrTcr7eKSz2eimrrhWSiKnp4W8T5HHoAP+tFeLYpuf41aaCC57SXuvV0e0Odb4ZXMpYD9Eubo6Rw89Q3toepCiCLbVQ7MNm9FStpaXAcYjiaNOH8VQnX3kt1PvKwfaNuz7J8wpZvBx+LH69w9CrtIEHCfbEP4sjz9HX2hBrNRSPt32PZPskyFtDeGirttSSaG5QtIiqAOxHqvHdp+BI5qOEBERAREQEREBERAREQEREBERAREQEREBERAREQEREBERAREQEREBdyyWu43u70totNHNW11XKIoIW8T5HHoAF0196CsrLfWR1lBVT0lTEeKOaCQsew+YcOYQbHt1nYJbtlVnbeLwyGty6si0qJx6TKRh6wxH9Z3f3Kc1rHwveV2xYvwRx5XLdqdpBMN1jFSHewvP8Zp7nBTdhe+608EWZYURz9OotVRry9kUn/GguUiiLC95HY7lHAyHLYLXUOOngXRhpSP6bvQ+xxUrUNZSV9MyqoaqCqgfzbLDIHtd7iORQePtAw/H87xWrxrJaFtXQVLeY6PjcPmvY71XDsf0gkLWlvA7Hr/sjys0FeHVdoqXOdbbi1mjJ2D1XfRkHdvxGoK2mLH9oOHY/nmK1eNZLQtq6Cpb7nxO9V7Heq4dj+zUINQ6KS94DY/kGyTKzb68r6u0VLnOttxazRk7B6p+jIOWrfiORCjRAREQ function buildTickerItem() {
  return `<span class="ticker-item">
    <img class="ticker-logo" src="${LOGO_SRC}" alt="">
    <span class="ticker-title">PIZZA</span>
  </span>`;
}
const track = document.getElementById('tickerTrack');
let html = '';
for (let i = 0; i < 12; i++) html += buildTickerItem();
track.innerHTML = html;

/* ═══════════════════════════════
   FLYING LOGOS
═══════════════════════════════ */
const pc  = document.getElementById('pizzaCanvas');
const pct = pc.getContext('2d');
const sc  = document.getElementById('sparksCanvas');
const sct = sc.getContext('2d');
let W, H;
function resize() {
  W = pc.width = sc.width = window.innerWidth;
  H = pc.height = sc.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// pre-load logo image
const logoImg = new Image();
logoImg.src = LOGO_SRC;

class FlyingLogo {
  constructor(init) { this.spawn(init); }
  spawn(init) {
    this.size  = 22 + Math.random() * 50;
    this.x     = Math.random() * (W||1400);
    this.y     = init ? Math.random() * (H||900) : (H||900) + this.size;
    this.speed = .14 + Math.random() * .32;
    this.vx    = (Math.random() - .5) * .45;
    this.rot   = Math.random() * Math.PI * 2;
    this.vrot  = (Math.random() - .5) * .010;
    this.alpha = .06 + Math.random() * .12;
    this.life  = 0;
    this.max   = (H||900) / this.speed * 1.4;
  }
  update() {
    this.x += this.vx; this.y -= this.speed; this.rot += this.vrot; this.life++;
    if (this.y < -this.size * 2) this.spawn(false);
  }
  draw(ctx) {
    if (!logoImg.complete) return;
    const prog = this.life / this.max;
    const fade = prog < .08 ? prog/.08 : prog > .85 ? 1-(prog-.85)/.15 : 1;
    ctx.save();
    ctx.globalAlpha = this.alpha * fade;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.drawImage(logoImg, -this.size/2, -this.size/2, this.size, this.size);
    ctx.restore();
  }
}
const flyingLogos = [];
for (let i=0;i<20;i++) flyingLogos.push(new FlyingLogo(true));
function animLogo() {
  pct.clearRect(0,0,W,H);
  flyingLogos.forEach(p=>{ p.update(); p.draw(pct); });
  requestAnimationFrame(animLogo);
}
animLogo();

/* ═══════════════════════════════
   SPARKS — brand colors
═══════════════════════════════ */
const PCOLS=['#c22b27','#efa52b','#d44a20','#e83030','#f5b800'];
class Spark {
  constructor(init) { this.spawn(init); }
  spawn(init) {
    this.x=Math.random()*(W||1400); this.y=init?Math.random()*(H||900):(H||900)+6;
    this.r=.4+Math.random()*1.8; this.col=PCOLS[Math.floor(Math.random()*PCOLS.length)];
    this.a=.15+Math.random()*.5; this.vx=(Math.random()-.5)*.5; this.vy=-(.25+Math.random()*.7);
    this.life=0; this.max=180+Math.random()*280;
  }
  update() { this.x+=this.vx; this.y+=this.vy; this.life++; if(this.life>this.max||this.y<-8) this.spawn(false); }
  draw(ctx) {
    const p=this.life/this.max,f=p<.1?p/.1:p>.75?1-(p-.75)/.25:1;
    ctx.save(); ctx.globalAlpha=this.a*f; ctx.shadowBlur=7; ctx.shadowColor=this.col;
    ctx.fillStyle=this.col; ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
}
class Sparkle {
  constructor(init) { this.spawn(init); }
  spawn(init) {
    this.x=Math.random()*(W||1400); this.y=init?Math.random()*(H||900):(H||900)+10;
    this.sz=1.5+Math.random()*3; this.col=Math.random()>.6?'#ffd700':'#ff2244';
    this.a=.25+Math.random()*.45; this.vx=(Math.random()-.5)*.3; this.vy=-(.1+Math.random()*.4);
    this.rot=Math.random()*Math.PI; this.vrot=(Math.random()-.5)*.04;
    this.life=0; this.max=300+Math.random()*400;
  }
  update() { this.x+=this.vx; this.y+=this.vy; this.rot+=this.vrot; this.life++; if(this.life>this.max||this.y<-10) this.spawn(false); }
  draw(ctx) {
    const p=this.life/this.max,f=p<.1?p/.1:p>.7?1-(p-.7)/.3:1;
    ctx.save(); ctx.globalAlpha=this.a*f; ctx.strokeStyle=this.col; ctx.shadowBlur=5; ctx.shadowColor=this.col;
    ctx.lineWidth=.8; ctx.translate(this.x,this.y); ctx.rotate(this.rot);
    const s=this.sz;
    ctx.beginPath();
    ctx.moveTo(-s,0); ctx.lineTo(s,0); ctx.moveTo(0,-s); ctx.lineTo(0,s);
    ctx.moveTo(-s*.7,-s*.7); ctx.lineTo(s*.7,s*.7); ctx.moveTo(s*.7,-s*.7); ctx.lineTo(-s*.7,s*.7);
    ctx.stroke(); ctx.restore();
  }
}
const sparks=[];
for(let i=0;i<80;i++) sparks.push(new Spark(true));
for(let i=0;i<28;i++) sparks.push(new Sparkle(true));
function animSparks() {
  sct.clearRect(0,0,W,H);
  sparks.forEach(s=>{ s.update(); s.draw(sct); });
  requestAnimationFrame(animSparks);

/* ═══════════════════════════════
   ANTI-IDLE / ANTI-SLEEP
═══════════════════════════════ */
setInterval(() => {
  document.dispatchEvent(new MouseEvent('mousemove', { bubbles: true }));
}, 30000);

async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try { await navigator.wakeLock.request('screen'); } catch (e) {}
  }
}
requestWakeLock();

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});

window.addEventListener('beforeunload', e => {
  e.preventDefault();
  e.returnValue = '';
});
</script>

<script>
/* ═══════════════════════════════
   RANDOM CARD FLICKER
═══════════════════════════════ */
(function() {
  setTimeout(() => {
    const cards = Array.from(document.querySelectorAll('.card'));

    function flickerCard(card) {
      if (card.dataset.flickering === '1') return;
      card.dataset.flickering = '1';

      const effectType = Math.floor(Math.random() * 3);

      if (effectType === 0) {
        card.style.transition = 'transform .3s cubic-bezier(.34,1.56,.64,1), border-color .2s, box-shadow .2s, background .2s';
        card.style.transform = 'translateY(-4px) scale(1.012)';
        card.style.borderColor = '#c22b27';
        card.style.boxShadow = '0 8px 28px #c22b2750, 0 2px 8px #00000060, inset 0 0 20px #c22b2718';
        card.style.background = 'linear-gradient(145deg, #222, #1a1a1a)';

        const num = card.querySelector('.card-number');
        const price = card.querySelector('.card-price');
        const name = card.querySelector('.card-name');
        if (num) num.style.textShadow = '0 0 12px #c22b27, 0 0 24px #c22b2780';
        if (price) price.style.textShadow = '0 0 12px #efa52b, 0 0 24px #efa52b80';
        if (name) name.style.color = '#ffffff';

        const duration = 800 + Math.random() * 600;
        setTimeout(() => {
          card.style.transform = '';
          card.style.borderColor = '';
          card.style.boxShadow = '';
          card.style.background = '';
          if (num) num.style.textShadow = '';
          if (price) price.style.textShadow = '';
          if (name) name.style.color = '';
          setTimeout(() => { card.dataset.flickering = '0'; }, 400);
        }, duration);

      } else if (effectType === 1) {
        card.style.transition = 'border-color .15s, box-shadow .15s';
        card.style.borderColor = '#efa52b';
        card.style.boxShadow = '0 0 18px #efa52b55, inset 0 0 12px #efa52b10';

        const duration = 500 + Math.random() * 400;
        setTimeout(() => {
          card.style.borderColor = '';
          card.style.boxShadow = '';
          setTimeout(() => { card.dataset.flickering = '0'; }, 300);
        }, duration);

      } else {
        card.style.transition = 'box-shadow .08s, border-color .08s';
        card.style.borderColor = '#c22b27';
        card.style.boxShadow = '0 0 22px #c22b2760';
        setTimeout(() => {
          card.style.borderColor = '';
          card.style.boxShadow = '';
          setTimeout(() => {
            card.style.borderColor = '#c22b27';
            card.style.boxShadow = '0 0 22px #c22b2760';
            setTimeout(() => {
              card.style.borderColor = '';
              card.style.boxShadow = '';
              setTimeout(() => { card.dataset.flickering = '0'; }, 200);
            }, 120);
          }, 100);
        }, 120);
      }
    }

    function scheduleNext() {
      const count = 1 + Math.floor(Math.random() * 2);
      const shuffled = [...cards].sort(() => Math.random() - .5);
      for (let i = 0; i < count; i++) {
        const delay = i * (150 + Math.random() * 200);
        setTimeout(() => flickerCard(shuffled[i]), delay);
      }
      const nextIn = 1200 + Math.random() * 2300;
      setTimeout(scheduleNext, nextIn);
    }

    setTimeout(scheduleNext, 2000);
  }, 1000);
})();
</script>
