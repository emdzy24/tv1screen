<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viva La Pizza – Menú</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #2a2a2a;
    --card-bg: #181818;
    --card-bg2: #141414;
    --white: #f0ece4;
    --neon-red: #ff2244;
    --neon-gold: #ffd700;
    --gold: #e8a820;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Montserrat', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background-image:
      radial-gradient(circle at 5% 95%, #c0392b12 0%, transparent 40%),
      radial-gradient(circle at 95% 5%, #e8a8200d 0%, transparent 40%);
  }

  /* animated grid overlay */
  body::before {
    content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
      linear-gradient(rgba(232,168,32,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,168,32,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridScroll 20s linear infinite;
  }
  @keyframes gridScroll { to { background-position: 0 60px; } }

  /* canvases */
  #pizzaCanvas  { position:fixed; inset:0; z-index:1; pointer-events:none; }
  #sparksCanvas { position:fixed; inset:0; z-index:2; pointer-events:none; }

  /* ── NEON TITLE ── */
  .title-section {
    position:relative; z-index:10;
    text-align:center;
    padding: 14px 20px 10px;
    flex-shrink: 0;
  }
  .neon-box {
    display:inline-block;
    padding: 7px 52px 5px;
    border: 2px solid var(--neon-red);
    border-radius: 4px;
    box-shadow: 0 0 8px var(--neon-red), 0 0 24px var(--neon-red), inset 0 0 10px #ff224418;
  }
  .neon-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.4rem, 5vw, 4.8rem);
    letter-spacing: .22em;
    color: #fff;
    line-height: 1;
    text-shadow: 0 0 7px #fff, 0 0 14px #fff, 0 0 30px var(--neon-red), 0 0 60px var(--neon-red), 0 0 100px var(--neon-red);
    animation: neonFlicker 5s infinite;
  }
  @keyframes neonFlicker {
    0%,19%,21%,23%,25%,54%,56%,100% {
      text-shadow: 0 0 7px #fff, 0 0 14px #fff, 0 0 30px var(--neon-red), 0 0 60px var(--neon-red), 0 0 100px var(--neon-red);
      color: #fff;
    }
    20%,24%,55% { text-shadow:none; color:#ff224455; }
  }

  /* ── Grid ── */
  main {
    position:relative; z-index:5;
    flex: 1;
    padding: 8px 12px 12px;
    overflow: hidden;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(5, 1fr);
    gap: 8px;
    height: 100%;
  }

  /* ── Card ── */
  .card {
    position: relative;
    background: linear-gradient(145deg, var(--card-bg), var(--card-bg2));
    border: 1px solid #ffffff0d;
    border-radius: 7px;
    padding: 6px 0 0 8px;
    overflow: hidden;
    transition: transform .22s, border-color .22s, box-shadow .22s;
    animation: fadeUp .5s ease both;
    display: flex;
    flex-direction: column;
    backdrop-filter: blur(2px);
  }
  .card:hover {
    transform: translateY(-3px);
    border-color: var(--neon-red);
    box-shadow: 0 6px 22px #ff224430, inset 0 0 14px #ff224408;
  }
  .card::after {
    content:''; position:absolute; left:0; top:15%; bottom:15%;
    width:3px; background:linear-gradient(180deg,transparent,var(--neon-red),transparent);
    opacity:0; transition:opacity .22s; border-radius:0 2px 2px 0;
  }
  .card:hover::after { opacity:1; }
  .card::before {
    content:''; position:absolute; top:0; left:5%; right:5%; height:1px;
    background:linear-gradient(90deg,transparent,var(--neon-red),transparent);
    opacity:0; transition:opacity .3s;
  }
  .card:hover::before { opacity:1; }

  /* ── Card inner layout: left content + right photo ── */
  .card-inner {
    display: flex;
    height: 100%;
    gap: 0;
    position: relative;
    z-index: 2;
  }

  /* Left content: 2/3 width */
  .card-content {
    flex: 0 0 66%;
    max-width: 66%;
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }

  /* Right photo: 1/3 width, fills card fully edge to edge */
  .card-photo-wrap {
    flex: 0 0 34%;
    position: relative;
    overflow: hidden;
    margin: -10px 0 0 0;
    border-radius: 0 7px 7px 0;
  }
  .card-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 1;
    pointer-events: none;
    filter: saturate(1.5) brightness(1.15);
    mask-image: linear-gradient(to right, transparent 0%, black 22%);
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 22%);
  }

  /* ── Row 1: number · name · price (same line) ── */
  .card-row {
    display: flex;
    align-items: baseline;
    gap: 5px;
    flex-wrap: nowrap;
    min-width: 0;
  }
  .card-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(0.85rem, 1.1vw, 1.15rem);
    letter-spacing: .06em;
    color: var(--neon-red);
    opacity: .9;
    line-height: 1;
    text-shadow: 0 0 8px #ff224460;
    flex-shrink: 0;
  }
  .card-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(0.8rem, 1.05vw, 1.1rem);
    letter-spacing: .05em;
    color: var(--white);
    line-height: 1.1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex-shrink: 1;
    min-width: 0;
  }
  .card-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(0.8rem, 1.05vw, 1.1rem);
    letter-spacing: .04em;
    color: var(--neon-gold);
    white-space: nowrap;
    text-shadow: 0 0 8px #ffd70055;
    flex-shrink: 0;
  }
  .dot {
    color: #ffffff25;
    font-size: .65rem;
    flex-shrink: 0;
    align-self: center;
  }

  /* ── Row 2: badges under name ── */
  .card-badges {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: .55rem;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 1px 5px;
    border-radius: 2px;
    font-weight: 700;
    white-space: nowrap;
  }
  .tag-veg { background:#1a3d1a; color:#5cde5c; border:1px solid #2d6b2d; }
  .tag-hot { background:#3d1515; color:#f56565; border:1px solid #6b2424; }
  .tag-sea { background:#0f2a3d; color:#4db8ff; border:1px solid #1a4a6b; }

  /* ── Row 3: ingredients ── */
  .card-ingredients {
    font-size: clamp(0.6rem, 0.72vw, 0.72rem);
    letter-spacing: .04em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.88);
    line-height: 1.4;
    white-space: normal;
    word-break: break-word;
    flex: 1;
  }

  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .card:nth-child(1){animation-delay:.03s} .card:nth-child(2){animation-delay:.06s} .card:nth-child(3){animation-delay:.09s}
  .card:nth-child(4){animation-delay:.12s} .card:nth-child(5){animation-delay:.15s} .card:nth-child(6){animation-delay:.18s}
  .card:nth-child(7){animation-delay:.21s} .card:nth-child(8){animation-delay:.24s} .card:nth-child(9){animation-delay:.27s}
  .card:nth-child(10){animation-delay:.30s} .card:nth-child(11){animation-delay:.33s} .card:nth-child(12){animation-delay:.36s}
  .card:nth-child(13){animation-delay:.39s} .card:nth-child(14){animation-delay:.42s} .card:nth-child(15){animation-delay:.45s}
  .card:nth-child(16){animation-delay:.48s} .card:nth-child(17){animation-delay:.51s} .card:nth-child(18){animation-delay:.54s}
  .card:nth-child(19){animation-delay:.57s} .card:nth-child(20){animation-delay:.60s} .card:nth-child(21){animation-delay:.63s}
  .card:nth-child(22){animation-delay:.66s} .card:nth-child(23){animation-delay:.69s} .card:nth-child(24){animation-delay:.72s}
  .card:nth-child(25){animation-delay:.75s}
</style>
</head>
<body>

<canvas id="pizzaCanvas"></canvas>
<canvas id="sparksCanvas"></canvas>

<div class="title-section">
  <div class="neon-box">
    <div class="neon-title">PIZZAS</div>
  </div>
</div>

<main>
  <div class="grid" id="menuGrid"></div>
</main>

<script>
/* ═══════════════════════════════
   FLYING PIZZA EMOJIS
═══════════════════════════════ */
const pc  = document.getElementById('pizzaCanvas');
const pct = pc.getContext('2d');
const sc  = document.getElementById('sparksCanvas');
const sct = sc.getContext('2d');
let W, H;
function resize() {
  W = pc.width = sc.width = window.innerWidth;
  H = pc.height = sc.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const PIZZA_EMOJIS = ['🍕','🍕','🍕','🍕','🍕','🧀','🌿','🔥','🫙'];
class FlyingPizza {
  constructor(init) { this.spawn(init); }
  spawn(init) {
    this.size  = 18 + Math.random() * 44;
    this.x     = Math.random() * (W||1400);
    this.y     = init ? Math.random() * (H||900) : (H||900) + this.size;
    this.emoji = PIZZA_EMOJIS[Math.floor(Math.random()*PIZZA_EMOJIS.length)];
    this.speed = .18 + Math.random() * .36;
    this.vx    = (Math.random() - .5) * .5;
    this.rot   = Math.random() * Math.PI * 2;
    this.vrot  = (Math.random() - .5) * .012;
    this.alpha = .05 + Math.random() * .11;
    this.life  = 0;
    this.max   = (H||900) / this.speed * 1.4;
  }
  update() {
    this.x += this.vx; this.y -= this.speed; this.rot += this.vrot; this.life++;
    if (this.y < -this.size * 2) this.spawn(false);
  }
  draw(ctx) {
    const prog = this.life / this.max;
    const fade = prog < .08 ? prog/.08 : prog > .85 ? 1-(prog-.85)/.15 : 1;
    ctx.save();
    ctx.globalAlpha = this.alpha * fade;
    ctx.translate(this.x, this.y); ctx.rotate(this.rot);
    ctx.font = `${this.size}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(this.emoji, 0, 0);
    ctx.restore();
  }
}
const pizzas3d = [];
for (let i=0;i<22;i++) pizzas3d.push(new FlyingPizza(true));
function animPizza() {
  pct.clearRect(0,0,W,H);
  pizzas3d.forEach(p=>{ p.update(); p.draw(pct); });
  requestAnimationFrame(animPizza);
}
animPizza();

/* ═══════════════════════════════
   SPARKS
═══════════════════════════════ */
const PCOLS=['#ff2244','#ffd700','#ff6644','#ff4466','#ffbb00'];
class Spark {
  constructor(init) { this.spawn(init); }
  spawn(init) {
    this.x=Math.random()*(W||1400); this.y=init?Math.random()*(H||900):(H||900)+6;
    this.r=.4+Math.random()*1.8; this.col=PCOLS[Math.floor(Math.random()*PCOLS.length)];
    this.a=.15+Math.random()*.5; this.vx=(Math.random()-.5)*.5; this.vy=-(.25+Math.random()*.7);
    this.life=0; this.max=180+Math.random()*280;
  }
  update() { this.x+=this.vx; this.y+=this.vy; this.life++; if(this.life>this.max||this.y<-8) this.spawn(false); }
  draw(ctx) {
    const p=this.life/this.max,f=p<.1?p/.1:p>.75?1-(p-.75)/.25:1;
    ctx.save(); ctx.globalAlpha=this.a*f; ctx.shadowBlur=7; ctx.shadowColor=this.col;
    ctx.fillStyle=this.col; ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
}
class Sparkle {
  constructor(init) { this.spawn(init); }
  spawn(init) {
    this.x=Math.random()*(W||1400); this.y=init?Math.random()*(H||900):(H||900)+10;
    this.sz=1.5+Math.random()*3; this.col=Math.random()>.6?'#ffd700':'#ff2244';
    this.a=.25+Math.random()*.45; this.vx=(Math.random()-.5)*.3; this.vy=-(.1+Math.random()*.4);
    this.rot=Math.random()*Math.PI; this.vrot=(Math.random()-.5)*.04;
    this.life=0; this.max=300+Math.random()*400;
  }
  update() { this.x+=this.vx; this.y+=this.vy; this.rot+=this.vrot; this.life++; if(this.life>this.max||this.y<-10) this.spawn(false); }
  draw(ctx) {
    const p=this.life/this.max,f=p<.1?p/.1:p>.7?1-(p-.7)/.3:1;
    ctx.save(); ctx.globalAlpha=this.a*f; ctx.strokeStyle=this.col; ctx.shadowBlur=5; ctx.shadowColor=this.col;
    ctx.lineWidth=.8; ctx.translate(this.x,this.y); ctx.rotate(this.rot);
    const s=this.sz;
    ctx.beginPath();
    ctx.moveTo(-s,0); ctx.lineTo(s,0); ctx.moveTo(0,-s); ctx.lineTo(0,s);
    ctx.moveTo(-s*.7,-s*.7); ctx.lineTo(s*.7,s*.7); ctx.moveTo(s*.7,-s*.7); ctx.lineTo(-s*.7,s*.7);
    ctx.stroke(); ctx.restore();
  }
}
const sparks=[];
for(let i=0;i<80;i++) sparks.push(new Spark(true));
for(let i=0;i<28;i++) sparks.push(new Sparkle(true));
function animSparks() {
  sct.clearRect(0,0,W,H);
  sparks.forEach(s=>{ s.update(); s.draw(sct); });
  requestAnimationFrame(animSparks);
}
animSparks();

/* ═══════════════════════════════
   PIZZA CARDS
═══════════════════════════════ */
const pizzas=[
  {n:1,  name:"Margarita",        price:"8.9€",  ing:"Tomate, Mozzarella",                                                         tags:["veg"],  photo:"https://upload.wikimedia.org/wikipedia/commons/a/a3/Eq_it-na_pizza-margherita_sep2005_sml.jpg"},
  {n:2,  name:"Margarita Búfala", price:"10.5€", ing:"Tomate, Mozzarella de Búfala, Albahaca",                                     tags:["veg"],  photo:null},
  {n:3,  name:"Peperoni",         price:"9.9€",  ing:"Tomate, Mozzarella, Peperoni",                                               tags:[],       photo:null},
  {n:4,  name:"Prosciutto",       price:"9.9€",  ing:"Tomate, Mozzarella, Jamón Cocido",                                           tags:[],       photo:"https://lh3.googleusercontent.com/d/1mvVqVycWkMQzFAOZZ38XMb-iwCF3zkMB"},
  {n:5,  name:"Carbonara",        price:"10.9€", ing:"Nata, Huevo, Bacon, Cebolla",                                                tags:[],       photo:null},
  {n:6,  name:"Barbacoa",         price:"12.9€", ing:"Tomate, Mozzarella, Pollo, Bacon, Champiñones, Salsa Barbacoa",              tags:[],       photo:null},
  {n:7,  name:"4 Quesos",         price:"11.9€", ing:"Tomate, Mozzarella, Queso Azul, Queso de Cabra, Parmesano",                  tags:["veg"],  photo:null},
  {n:8,  name:"Pollo al Ajo",     price:"11.9€", ing:"Tomate, Mozzarella, Pollo al Ajo, Chili Fresco, Alioli",                     tags:["hot"],  photo:null},
  {n:9,  name:"Bella Napoli",     price:"12.5€", ing:"Tomate, Mozzarella, Jamón Serrano, Tomates Cherry, Rúcula, Parmesano",       tags:[],       photo:null},
  {n:10, name:"Hawaiana",         price:"10.5€", ing:"Tomate, Mozzarella, Jamón Cocido, Piña",                                     tags:[],       photo:null},
  {n:11, name:"4 Carnes",         price:"13.9€", ing:"Tomate, Mozzarella, Carne Picada, Pollo, Peperoni, Jamón Cocido",            tags:[],       photo:null},
  {n:12, name:"Vegetariana",      price:"11.9€", ing:"Tomate, Mozzarella, Cebolla, Maíz, Pimiento, Champiñones",                   tags:["veg"],  photo:null},
  {n:13, name:"Primavera",        price:"11.9€", ing:"Tomate, Mozzarella, Queso de Cabra, Aceitunas Negras, Rúcula",               tags:["veg"],  photo:null},
  {n:14, name:"Capri",            price:"11.9€", ing:"Tomate, Mozzarella, Jamón Cocido, Champiñones, Aceitunas Negras",            tags:[],       photo:null},
  {n:15, name:"César",            price:"12.5€", ing:"Nata, Mozzarella, Pollo, Rúcula, Parmesano, Salsa César",                   tags:[],       photo:null},
  {n:16, name:"Mexicana",         price:"12.9€", ing:"Tomate, Mozzarella, Carne Picada, Pollo, Cebolla, Jalapeños, Salsa Picante", tags:["hot"],  photo:null},
  {n:17, name:"Atún",             price:"10.9€", ing:"Tomate, Mozzarella, Atún, Cebolla, Maíz",                                   tags:["sea"],  photo:null},
  {n:18, name:"Marinera",         price:"14.5€", ing:"Tomate, Mozzarella, Atún, Mejillones, Gambas, Calamares",                    tags:["sea"],  photo:null},
  {n:19, name:"Diavola",          price:"13.5€", ing:"Tomate, Mozzarella, Peperoni, Carne Picada, Cebolla, Pimiento, Jalapeños",   tags:["hot"],  photo:null},
  {n:20, name:"Gourmet",          price:"13.5€", ing:"Tomate, Mozzarella, Pollo, Queso de Cabra, Cebolla Caramelizada",            tags:[],       photo:null},
  {n:21, name:"Bianca",           price:"11.5€", ing:"Nata, Mozzarella, Jamón Cocido, Cebolla, Champiñones",                      tags:[],       photo:null},
  {n:22, name:"Gambas Pil-Pil",   price:"11.5€", ing:"Tomate, Mozzarella, Gambas, Cebolla, Chili Fresco",                         tags:["sea","hot"], photo:null},
  {n:23, name:"Burratina",        price:"14.5€", ing:"Pesto, Mozzarella, Burrata, Mortadela, Rúcula, Pistachos",                  tags:[],       photo:null},
  {n:24, name:"4 Stagioni",       price:"12.9€", ing:"Tomate, Mozzarella, Peperoni, Jamón Cocido, Aceitunas Negras, Champiñones",  tags:[],       photo:null},
  {n:25, name:"Boloñesa",         price:"11.9€", ing:"Nata, Mozzarella, Salsa Boloñesa, Carne Picada",                            tags:[],       photo:null}
];

const tagMap = {
  veg: ['tag-veg','🌿 Veg'],
  hot: ['tag-hot','🌶 Picante'],
  sea: ['tag-sea','🐟 Mar']
};

const grid = document.getElementById('menuGrid');
pizzas.forEach(p => {
  const badgesHTML = p.tags.map(t => `<span class="tag ${tagMap[t][0]}">${tagMap[t][1]}</span>`).join('');
  const photoHTML  = p.photo
    ? `<div class="card-photo-wrap"><img class="card-photo" src="${p.photo}" alt="${p.name}" loading="lazy"></div>`
    : '';

  grid.innerHTML += `
    <div class="card">
      <div class="card-inner">
        <div class="card-content">
          <div class="card-row">
            <span class="card-number">${String(p.n).padStart(2,'0')}</span>
            <span class="dot">·</span>
            <span class="card-name">${p.name}</span>
            <span class="dot">·</span>
            <span class="card-price">${p.price}</span>
          </div>
          ${badgesHTML ? `<div class="card-badges">${badgesHTML}</div>` : ''}
          <div class="card-ingredients">${p.ing}</div>
        </div>
        ${photoHTML}
      </div>
    </div>`;
});
</script>
</body>
</html>
